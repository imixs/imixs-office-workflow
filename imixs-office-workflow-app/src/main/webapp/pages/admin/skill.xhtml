<ui:composition xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:c="http://xmlns.jcp.org/jsp/jstl/core"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets" xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
	xmlns:marty="http://xmlns.jcp.org/jsf/composite/marty" xmlns:i="http://xmlns.jcp.org/jsf/composite/imixs"
	template="/layout/template.xhtml">

	<!-- The view accepts the params 'id' and 'parent' -->
	<f:metadata>
		<f:viewAction action="#{workflowController.onLoad()}" if="#{not empty param.id}" />
		<f:viewAction action="#{skillController.create(param.parent)}" if="#{empty param.id}" />
	</f:metadata>

	<ui:define name="content">
		<f:view>
			<h:form id="space_form_id">

				<marty:userSearch />

				<div class="imixs-form">
					<div class="imixs-header">
						<h1>
							<h:outputText value="#{message['ai.skill.title']}: " />
							<h:outputText rendered="#{! empty workflowController.workitem.item['skill.parent.name']}"
								value="#{workflowController.workitem.item['skill.parent.name']}" />
							<h:outputText rendered="#{! empty workflowController.workitem.item['skill.parent.name']}"
								value="." />
							<h:outputText value="#{workflowController.workitem.item['skill.name']} " />
							<h:outputText value=" - #{workflowController.workitem.item['$workflowstatus']}" />
						</h1>
					</div>

					<div class="imixs-body">
						<div class="imixs-tabs">
							<ul>
								<li><a href="#tab-1">#{message['ai.skill.sub_general']}</a></li>

							</ul>

							<div id="tab-1">

								<div class="ui-state-highlight ui-corner-all"
									style="margin-bottom: 10px; padding: .5em;">
									<p>#{message['ai.skill.help_general']}</p>
								</div>

								<div class="imixs-form-panel">
									<dl class="columns-1">
										<dt>
											<h:outputLabel for="name_id" value="#{message.name}">
												<h:message style="color: red" for="name_id" showSummary="true"
													showDetail="false" />
											</h:outputLabel>
										</dt>
										<dd>
											<h:selectOneMenu style="width:20em;"
												value="#{workflowController.workitem.item['$uniqueidref']}">
												<f:selectItem itemLabel=" - " itemValue="[ROOT]"></f:selectItem>
												<c:forEach items="#{skillController.skills}" var="skill">
													<c:if
														test="#{skill.item['name'] ne workflowController.workitem.item['name']}">
														<f:selectItem itemLabel="#{skill.item['name']}"
															itemValue="#{skill.item['$UniqueID']}">
														</f:selectItem>
													</c:if>
												</c:forEach>
											</h:selectOneMenu>
											<h:inputText style="width: 20em;" required="true"
												value="#{workflowController.workitem.item['skill.name']}" id="name_id">
											</h:inputText>
										</dd>
									</dl>

									<dl class="columns-1">
										<dt>
											<h:outputLabel value="#{message.title}"></h:outputLabel>
										</dt>
										<dd>
											<h:inputText required="false"
												value="#{workflowController.workitem.item['skill.topic']}">
											</h:inputText>
										</dd>
									</dl>

									<dl class="columns-1">
										<dt>
											<h:outputLabel value="#{message.description}"></h:outputLabel>
										</dt>
										<dd>
											<h:inputTextarea required="false"
												value="#{workflowController.workitem.item['skill.description']}"
												id="description_id" style="height: 8em; width: 95%">
											</h:inputTextarea>
										</dd>
									</dl>
									<dl class="columns-1">
										<dt>
											Content
										</dt>
										<dd>
											<ui:include src="/pages/workitems/parts/markdowneditor.xhtml">
												<ui:param name="workitem" value="#{workflowController.workitem}" />
												<ui:param name="required" value="#{false}" />
												<ui:param name="readonly" value="#{false}" />
												<ui:param name="name" value="skill.content" />

											</ui:include>
										</dd>

									</dl>
								</div>


								<div class="imixs-form-panel">

									<h2>Team</h2>

									<div class="imixs-form-section-3">


										<!-- ******** skill Manager ********* -->
										<dl>
											<dt>
												Manager
											</dt>
											<dd>
												<marty:userListInput
													value="#{workflowController.workitem.itemList['skill.manager']}"
													editmode="true" />
											</dd>
										</dl>
									</div>
								</div>
							</div>

						</div>
					</div>
					<!-- form-body end -->

					<ui:include src="/pages/admin/sub_footer.xhtml">
						<ui:param name="action" value="/pages/admin/skills" />
					</ui:include>

				</div>
			</h:form>



		</f:view>
	</ui:define>



</ui:composition>
