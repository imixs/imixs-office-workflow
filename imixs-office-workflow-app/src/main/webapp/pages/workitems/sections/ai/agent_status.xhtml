<ui:composition xmlns="http://www.w3.org/1999/xhtml" xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:f="http://java.sun.com/jsf/core" xmlns:c="http://java.sun.com/jsp/jstl/core"
	xmlns:h="http://java.sun.com/jsf/html" xmlns:i="http://java.sun.com/jsf/composite/imixs"
	xmlns:marty="http://java.sun.com/jsf/composite/marty">

	<style>
		.imixs-ai-protocol {
			margin-left: 10px;
		}

		.ai-status {
			margin-bottom: 10px;
		}

		.ai-status-row {
			display: flex;
			flex-direction: row;
			align-items: baseline;
		}

		.ai-status-label {
			flex: 0 0 80px;
			font-weight: bold;
		}

		.ai-status-value {
			flex: 1;
		}

		.ai-progress {
			width: 100%;
			height: 6px;
			background: #e5e5e5;
			border-radius: 3px;
			overflow: hidden;
			position: relative;
		}

		.ai-progress-indicator {
			position: absolute;
			height: 100%;
			width: 30%;
			background: #206B87;
			animation: ai-progress-running 1.5s linear infinite;
		}

		@keyframes ai-progress-running {
			0% {
				left: -30%;
			}

			100% {
				left: 100%;
			}
		}
	</style>

	<h:panelGroup layout="block" id="imixs_ai_protocol" styleClass="imixs-ai-protocol">
		<!-- Registers a JS function 'pollTaskId' that triggers an ajax request,
         re-rendering only the taskid span -->
		<h:commandScript name="pollTaskId" render="ai_status_panel" onevent="imixsAiPollHandler" />
		<div class="ai-status">

			<div class="ai-status-row">
				<span class="ai-status-label">Status:</span>
				<span class="ai-status-value">
					<i class="fa-solid fa-person-running" style="color: #206B87;"></i>
					RUNNING
				</span>
			</div>
			<h:panelGroup layout="block" styleClass="ai-status-row" id="ai_status_panel">
				<span class="ai-status-label">Task:</span>
				<span><i class="fa-solid fa-atom" style="color: #aaa;"></i><span class="ai-status-value"
						style="margin-left:5px;" id=" ai_status_panel_taskid">#{aIAgentStatusController.status}</span>
				</span>
			</h:panelGroup>
		</div>
		<div class="ai-progress">
			<div class="ai-progress-indicator"></div>
		</div>
	</h:panelGroup>

	<script type="text/javascript">
		/*<![CDATA[*/
		(function () {

			// Find the taskid span regardless of the naming container prefix
			function findTaskIdElement() {
				return document.querySelector('[id$="ai_status_panel_taskid"]');
			}

			var currentTaskId = null;
			var initialEl = findTaskIdElement();
			if (initialEl) {
				currentTaskId = initialEl.textContent.trim();
			}

			// Called by h:commandScript after each ajax cycle
			window.imixsAiPollHandler = function (data) {

				if (data.status === 'success') {
					var el = findTaskIdElement();
					if (el) {
						var newTaskId = el.textContent.trim();
						if (currentTaskId !== null && newTaskId !== currentTaskId) {
							// Task changed on the backend -> full reload
							// to refresh all form elements and action buttons
							window.location.reload();
						} else {
							currentTaskId = newTaskId;
						}
					}
				}
			};

			// Trigger the ajax poll every 4 seconds
			var pollIntervalId = setInterval(function () {
				pollTaskId();
			}, 1000);

			// Independent safety reload every 60 seconds
			setInterval(function () {
				window.location.reload();
			}, 60000);

		})();
		/*]]>*/
	</script>

</ui:composition>
